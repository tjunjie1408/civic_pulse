repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: pyright
        name: pyright strict
        entry: uv run pyright src scripts tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest non-live
        entry: uv run pytest -m "not live"
        language: system
        pass_filenames: false
